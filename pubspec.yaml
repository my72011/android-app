name: mostafa_portfolio
description: Mostafa Yasser — Developer • Designer • Creator
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Animation
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.7.0
  flutter_animate: ^4.5.0
  visibility_detector: ^0.4.0+2

  # Utils
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # fonts are loaded via google_fonts, no local assets needed

  assets:
    - assets/images/
    # No local images referenced in the HTML, all are emoji/iconss