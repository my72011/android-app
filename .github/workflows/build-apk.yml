name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Fix Gradle Version and Memory Limits
        run: |
          # إجبار المشروع على استخدام Gradle 8.4 المستقرة بدلاً من 9.1.0
          sed -i 's/gradle-.*-all.zip/gradle-8.4-all.zip/' android/gradle/wrapper/gradle-wrapper.properties
          sed -i 's/gradle-.*-bin.zip/gradle-8.4-bin.zip/' android/gradle/wrapper/gradle-wrapper.properties
          
          # إعادة كتابة gradle.properties لإيقاف الـ Daemon وتحديد الذاكرة
          cat << 'PROPS' > android/gradle.properties
          org.gradle.daemon=false
          org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m
          org.gradle.parallel=true
          android.useAndroidX=true
          android.enableJetifier=true
          PROPS

      - name: Install dependencies
        run: flutter pub get
      
      - name: Generate Hive adapters
        run: flutter pub run build_runner build --delete-conflicting-outputs
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GymCoach-Pro-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
