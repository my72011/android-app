name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Fix Gradle Memory Limits
        run: |
          # Ensure Gradle 9.1.0 is used as required by the project
          sed -i 's/gradle-.*-all.zip/gradle-9.1.0-all.zip/' android/gradle/wrapper/gradle-wrapper.properties
          sed -i 's/gradle-.*-bin.zip/gradle-9.1.0-bin.zip/' android/gradle/wrapper/gradle-wrapper.properties
          
          # Set safe memory limits for the 7GB GitHub Actions runner to prevent OOM Metaspace
          cat << 'PROPS' > android/gradle.properties
          org.gradle.daemon=false
          org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          android.useAndroidX=true
          android.enableJetifier=true
          PROPS

      - name: Install dependencies
        run: flutter pub get
      
      - name: Generate Hive adapters
        run: flutter pub run build_runner build --delete-conflicting-outputs
      
      - name: Build APK
        # Removed --no-daemon. The daemon is already disabled via gradle.properties.
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GymCoach-Pro-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
