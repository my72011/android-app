name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Fix Gradle Memory Limits for Gradle 9.1.0
        run: |
          # التأكد من استخدام Gradle 9.1.0 كما يتطلب المشروع
          sed -i 's/gradle-.*-all.zip/gradle-9.1.0-all.zip/' android/gradle/wrapper/gradle-wrapper.properties
          sed -i 's/gradle-.*-bin.zip/gradle-9.1.0-bin.zip/' android/gradle/wrapper/gradle-wrapper.properties
          
          # إيقاف الـ Daemon تماماً وتحديد مساحة ذاكرة Metaspace بـ 1GB لمنع الانهيار
          cat << 'PROPS' > android/gradle.properties
          org.gradle.daemon=false
          org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.caching=true
          android.useAndroidX=true
          android.enableJetifier=true
          PROPS

      - name: Install dependencies
        run: flutter pub get
      
      - name: Generate Hive adapters
        run: flutter pub run build_runner build --delete-conflicting-outputs
      
      - name: Build APK
        # إضافة --no-daemon كإجراء احتياطي إضافي لضمان عدم تشغيل أي عمليات خلفية
        run: flutter build apk --release --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GymCoach-Pro-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
